<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Locals Do It</title>
  <link rel="icon" type="image/png" href="LocalsDoIt_FavIcon.png">
  <link rel="stylesheet" href="style.css">
</head>

<body class="landing-body">

  <!-- TOP BAR -->
  <header class="landing-header">
    <nav class="landing-nav">
      <span class="landing-tagline">Guides and personal recommandations to elevated experiences</span>
      <button class="hamburger" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </nav>
  </header>

  <!-- NAV OVERLAY -->
  <div class="nav-overlay" id="navOverlay">
    <button class="nav-close" id="navClose" aria-label="Close menu">✕</button>
    <nav class="overlay-nav">
      <a href="nansensgade.html" class="overlay-link">Discover Nansensgade</a>
      <a href="mailto:kontakt@localsdoit.dk" class="overlay-link">Kontakt</a>
      <a href="https://letsgoforbroke.github.io/nansensgade/index.html" class="overlay-link">localsdoit.dk</a>
    </nav>
  </div>

  <!-- MAIN CONTENT -->
  <main class="landing-main">
    <div class="logo-wrap">
      <img src="LocalsDoIt_Logo.png" alt="Locals Do It" class="landing-logo">
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="landing-footer">
    <span>localsdoit.dk · kontakt@localsdoit.dk · 2026</span>
  </footer>

  <script>
    const hamburger = document.querySelector('.hamburger');
    const overlay = document.getElementById('navOverlay');
    const closeBtn = document.getElementById('navClose');

    hamburger.addEventListener('click', () => {
      overlay.classList.add('open');
    });
    closeBtn.addEventListener('click', () => {
      overlay.classList.remove('open');
    });
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) overlay.classList.remove('open');
    });
  </script>

</body>
</html>
